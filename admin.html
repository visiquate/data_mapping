<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payer Mapping Tool — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>if(localStorage.getItem('darkMode')!=='false')document.documentElement.classList.add('dark');</script>
    <style>
        :root {
            --bg-body: #f7f7f7; --bg-card: #ffffff; --bg-card-alt: #f8f9fa; --bg-accent: #f1f1f1;
            --text-primary: #333333; --text-secondary: #667085; --text-muted: #888888; --text-heading: #333333;
            --color-accent: #ff5100; --color-accent-hover: #e04800;
            --color-success: #27ae60; --color-success-hover: #219a52;
            --color-error: #e74c3c; --color-error-hover: #c0392b;
            --color-warning: #e67e22;
            --border-color: #ddd; --border-color-light: #eee;
            --input-bg: #ffffff; --input-text: #333333;
            --table-header-bg: #333333; --table-hover: #f8f9fa;
            --modal-bg: #ffffff; --modal-overlay: rgba(0,0,0,0.5);
            --shadow: rgba(0,0,0,0.1); --shadow-strong: rgba(0,0,0,0.3);
            --toast-bg: #333333;
            --btn-secondary-bg: #95a5a6; --btn-secondary-hover: #7f8c8d; --btn-disabled: #ccc;
            --badge-green-bg: #e8f5e9; --badge-green-color: #27ae60;
            --badge-orange-bg: #fff3e0; --badge-orange-color: #e67e22;
            --badge-gray-bg: #f0f0f0; --badge-gray-color: #888;
            --footer-color: #999; --link-color: #ff5100;
            --detail-th-bg: #f1f1f1; --detail-th-color: #555;
            --modal-close-color: #999; --modal-close-hover: #333;
        }
        html.dark {
            --bg-body: #303030; --bg-card: #282828; --bg-card-alt: #2c2c2c; --bg-accent: #2c2c2c;
            --text-primary: #dfdfdf; --text-secondary: #a9a9a9; --text-muted: #7d7d7d; --text-heading: #ffffff;
            --color-accent: #ff8927; --color-accent-hover: #e07520;
            --color-success: #07aa00; --color-success-hover: #069200;
            --color-error: #ff3232; --color-error-hover: #dd2222;
            --color-warning: #e67e22;
            --border-color: #404040; --border-color-light: #404040;
            --input-bg: #353535; --input-text: #dfdfdf;
            --table-header-bg: #2c2c2c; --table-hover: #353535;
            --modal-bg: #282828; --modal-overlay: rgba(0,0,0,0.7);
            --shadow: rgba(0,0,0,0.3); --shadow-strong: rgba(0,0,0,0.5);
            --toast-bg: #404040;
            --btn-secondary-bg: #555555; --btn-secondary-hover: #666666; --btn-disabled: #555555;
            --badge-green-bg: #1a3a1a; --badge-green-color: #07aa00;
            --badge-orange-bg: #3a2a1a; --badge-orange-color: #e67e22;
            --badge-gray-bg: #353535; --badge-gray-color: #7d7d7d;
            --footer-color: #7d7d7d; --link-color: #ff8927;
            --detail-th-bg: #2c2c2c; --detail-th-color: #a9a9a9;
            --modal-close-color: #7d7d7d; --modal-close-hover: #dfdfdf;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-body); color: var(--text-primary); line-height: 1.6; padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: var(--text-heading); margin-bottom: 10px; }
        .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 30px; }
        .card {
            background: var(--bg-card); border-radius: 8px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 2px 4px var(--shadow);
        }
        .card h2 {
            color: var(--text-heading); margin-bottom: 15px; font-size: 1.2em;
            border-bottom: 2px solid var(--color-accent); padding-bottom: 10px;
        }
        .btn {
            padding: 10px 20px; border: none; border-radius: 5px;
            cursor: pointer; font-size: 0.9em; font-weight: 500; transition: all 0.3s;
        }
        .btn-primary { background: var(--color-accent); color: white; }
        .btn-primary:hover { background: var(--color-accent-hover); }
        .btn-success { background: var(--color-success); color: white; }
        .btn-success:hover { background: var(--color-success-hover); }
        .btn-danger { background: var(--color-error); color: white; }
        .btn-danger:hover { background: var(--color-error-hover); }
        .btn-secondary { background: var(--btn-secondary-bg); color: white; }
        .btn-secondary:hover { background: var(--btn-secondary-hover); }
        .btn-sm { padding: 6px 12px; font-size: 0.8em; }
        .btn:disabled { background: var(--btn-disabled); cursor: not-allowed; }
        .hidden { display: none; }
        .toast {
            position: fixed; bottom: 20px; right: 20px; background: var(--toast-bg);
            color: white; padding: 15px 25px; border-radius: 8px;
            box-shadow: 0 4px 12px var(--shadow-strong); transform: translateY(100px);
            opacity: 0; transition: all 0.3s; z-index: 1000;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--color-success); }
        .toast.error { background: var(--color-error); }
        .login-form {
            max-width: 400px; margin: 100px auto; text-align: center;
        }
        .login-form input {
            width: 100%; padding: 12px 15px; border: 2px solid var(--color-accent);
            border-radius: 5px; font-size: 1em; margin-bottom: 15px;
            background: var(--input-bg); color: var(--input-text);
        }
        .login-form input:focus { outline: none; border-color: var(--color-accent-hover); box-shadow: 0 0 0 3px rgba(255,81,0,0.2); }
        .client-table { width: 100%; border-collapse: collapse; }
        .client-table th {
            background: var(--table-header-bg); color: white; padding: 12px 15px; text-align: left; font-weight: 500;
        }
        .client-table td { padding: 12px 15px; border-bottom: 1px solid var(--border-color-light); vertical-align: middle; color: var(--text-primary); }
        .client-table tr:hover { background: var(--table-hover); }
        .client-table .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .create-form { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .create-form input {
            padding: 10px 15px; border: 2px solid var(--border-color); border-radius: 5px; font-size: 0.95em;
            background: var(--input-bg); color: var(--input-text);
        }
        .create-form input:focus { outline: none; border-color: var(--color-accent); }
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.8em; font-weight: 500;
        }
        .badge-green { background: var(--badge-green-bg); color: var(--badge-green-color); }
        .badge-orange { background: var(--badge-orange-bg); color: var(--badge-orange-color); }
        .badge-gray { background: var(--badge-gray-bg); color: var(--badge-gray-color); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay); display: flex; align-items: center; justify-content: center; z-index: 999;
        }
        .modal {
            background: var(--modal-bg); border-radius: 8px; padding: 25px; max-width: 900px; width: 90%;
            max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 20px var(--shadow-strong);
        }
        .modal h3 { color: var(--text-heading); margin-bottom: 15px; }
        .modal-close { float: right; cursor: pointer; font-size: 1.5em; color: var(--modal-close-color); background: none; border: none; }
        .modal-close:hover { color: var(--modal-close-hover); }
        .mapping-detail-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .mapping-detail-table th { background: var(--detail-th-bg); padding: 10px; text-align: left; font-weight: 600; color: var(--detail-th-color); font-size: 0.9em; }
        .mapping-detail-table td { padding: 8px 10px; border-bottom: 1px solid var(--border-color-light); font-size: 0.9em; color: var(--text-primary); }
        nav { text-align: center; margin-bottom: 20px; }
        nav a { color: var(--link-color); text-decoration: none; margin: 0 10px; font-size: 0.9em; }
        nav a:hover { text-decoration: underline; }
        .dark-mode-toggle {
            position: fixed; top: 15px; right: 15px; width: 40px; height: 40px;
            border-radius: 50%; border: none; cursor: pointer; font-size: 1.2em;
            background: var(--bg-card); color: var(--text-primary);
            box-shadow: 0 2px 8px var(--shadow-strong); z-index: 1001;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.3s, color 0.3s;
        }
        .dark-mode-toggle:hover { background: var(--bg-card-alt); }
    </style>
</head>
<body>
    <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle dark mode" aria-label="Toggle dark mode"></button>
    <div class="container">
        <h1>Payer Mapping Tool — Admin</h1>
        <nav><a href="index.html">Mapping Tool</a> | <a href="phi_stripper.html">PHI Stripper</a> | <a href="docs/Payer Mapping Tool - Admin Guide.pdf" target="_blank">Admin Guide</a></nav>

        <!-- Login -->
        <div id="loginSection">
            <div class="login-form card">
                <h2>Admin Login</h2>
                <input type="password" id="adminPassphrase" placeholder="Enter admin passphrase">
                <br>
                <button class="btn btn-primary" id="loginBtn">Login</button>
            </div>
        </div>

        <!-- Dashboard (hidden until login) -->
        <div id="dashboardSection" class="hidden">

            <!-- Create Client -->
            <div class="card">
                <h2>Create New Client</h2>
                <div class="create-form">
                    <input type="text" id="newClientName" placeholder="Client name (e.g., UTSW)">
                    <input type="password" id="newClientPassphrase" placeholder="Client passphrase">
                    <button class="btn btn-success" id="createClientBtn">Create Client</button>
                </div>
            </div>

            <!-- Client List -->
            <div class="card">
                <h2>Clients</h2>
                <div id="clientListContainer">
                    <p style="color: var(--text-muted);">Loading clients...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
    <script>
    firebase.initializeApp({
        apiKey: "AIzaSyAYg8MItMR6l5Yw3Gt_gPIzZyBE6H0HlAM",
        authDomain: "payer-mapping-tool.firebaseapp.com",
        projectId: "payer-mapping-tool",
        storageBucket: "payer-mapping-tool.firebasestorage.app",
        messagingSenderId: "320017874286",
        appId: "1:320017874286:web:7ce224cba48524cca3957f"
    });
    const db = firebase.firestore();

    const STATE_MAP = {
        'AL': 'Alabama', 'AK': 'Alaska', 'AZ': 'Arizona', 'AR': 'Arkansas',
        'CA': 'California', 'CO': 'Colorado', 'CT': 'Connecticut', 'DE': 'Delaware',
        'DC': 'District of Columbia', 'FL': 'Florida', 'GA': 'Georgia', 'HI': 'Hawaii',
        'ID': 'Idaho', 'IL': 'Illinois', 'IN': 'Indiana', 'IA': 'Iowa', 'KS': 'Kansas',
        'KY': 'Kentucky', 'LA': 'Louisiana', 'ME': 'Maine', 'MD': 'Maryland',
        'MA': 'Massachusetts', 'MI': 'Michigan', 'MN': 'Minnesota', 'MS': 'Mississippi',
        'MO': 'Missouri', 'MT': 'Montana', 'NE': 'Nebraska', 'NV': 'Nevada',
        'NH': 'New Hampshire', 'NJ': 'New Jersey', 'NM': 'New Mexico', 'NY': 'New York',
        'NC': 'North Carolina', 'ND': 'North Dakota', 'OH': 'Ohio', 'OK': 'Oklahoma',
        'OR': 'Oregon', 'PA': 'Pennsylvania', 'RI': 'Rhode Island', 'SC': 'South Carolina',
        'SD': 'South Dakota', 'TN': 'Tennessee', 'TX': 'Texas', 'UT': 'Utah',
        'VT': 'Vermont', 'VA': 'Virginia', 'WA': 'Washington', 'WV': 'West Virginia',
        'WI': 'Wisconsin', 'WY': 'Wyoming'
    };
    const STATE_ABBREV = Object.fromEntries(Object.entries(STATE_MAP).map(([k, v]) => [v, k]));
    const ALT_PORTAL_VALUES = ['not available', 'UHC', 'Superior', 'Cigna', 'HPN', 'UMR', 'OptumCare'];

    async function hashPassphrase(text) {
        const encoded = new TextEncoder().encode(text);
        const hash = await crypto.subtle.digest('SHA-256', encoded);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast show ' + (type || '');
        setTimeout(() => { toast.className = 'toast'; }, 3000);
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Login
    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('adminPassphrase').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });

    async function handleLogin() {
        const passphrase = document.getElementById('adminPassphrase').value.trim();
        if (!passphrase) { showToast('Enter passphrase', 'error'); return; }

        try {
            const doc = await db.collection('config').doc('admin').get();
            if (!doc.exists) { showToast('Admin config not found in Firestore', 'error'); return; }
            const hash = await hashPassphrase(passphrase);
            if (hash === doc.data().passphraseHash) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                loadClients();
                showToast('Logged in as admin', 'success');
            } else {
                showToast('Incorrect passphrase', 'error');
            }
        } catch (e) {
            showToast('Error connecting to Firebase: ' + e.message, 'error');
        }
    }

    // Create Client
    document.getElementById('createClientBtn').addEventListener('click', async () => {
        const name = document.getElementById('newClientName').value.trim().toUpperCase();
        document.getElementById('newClientName').value = name;
        const passphrase = document.getElementById('newClientPassphrase').value.trim();
        if (!name || name.length < 2) { showToast('Client name must be at least 2 characters', 'error'); return; }
        if (!passphrase) { showToast('Enter a passphrase for the client', 'error'); return; }

        try {
            const existing = await db.collection('clients').doc(name).get();
            if (existing.exists) { showToast('Client "' + name + '" already exists', 'error'); return; }

            const hash = await hashPassphrase(passphrase);
            await db.collection('clients').doc(name).set({
                clientName: name,
                passphraseHash: hash,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                mappings: {}
            });
            document.getElementById('newClientName').value = '';
            document.getElementById('newClientPassphrase').value = '';
            showToast('Client "' + name + '" created', 'success');
            loadClients();
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    });

    // Load Clients
    async function loadClients() {
        const container = document.getElementById('clientListContainer');
        try {
            const snapshot = await db.collection('clients').get();
            if (snapshot.empty) {
                container.innerHTML = '<p style="color: var(--text-muted);">No clients yet. Create one above.</p>';
                return;
            }

            let html = '<table class="client-table"><thead><tr>' +
                '<th>Client</th><th>Mappings</th><th>Last Updated</th><th>Actions</th>' +
                '</tr></thead><tbody>';

            snapshot.forEach(doc => {
                const data = doc.data();
                const mappings = data.mappings || {};
                const count = Object.keys(mappings).length;
                const lastUpdated = data.lastUpdated?.toDate?.() ? data.lastUpdated.toDate().toLocaleDateString() : 'Never';
                const badge = count > 0 ? '<span class="badge badge-green">' + count + '</span>' : '<span class="badge badge-gray">0</span>';

                html += '<tr>' +
                    '<td><strong>' + escapeHtml(data.clientName) + '</strong></td>' +
                    '<td>' + badge + '</td>' +
                    '<td>' + lastUpdated + '</td>' +
                    '<td class="actions">' +
                        '<button class="btn btn-primary btn-sm" onclick="viewMappings(\'' + escapeHtml(data.clientName) + '\')">View</button>' +
                        '<button class="btn btn-success btn-sm" onclick="exportExcel(\'' + escapeHtml(data.clientName) + '\')">Excel</button>' +
                        '<button class="btn btn-secondary btn-sm" onclick="exportUiPath(\'' + escapeHtml(data.clientName) + '\')">UiPath</button>' +
                        '<button class="btn btn-sm" style="background:var(--color-warning);color:white;" onclick="editClient(\'' + escapeHtml(data.clientName) + '\')">Edit</button>' +
                        '<button class="btn btn-danger btn-sm" onclick="deleteClient(\'' + escapeHtml(data.clientName) + '\')">Delete</button>' +
                        '<button class="btn btn-sm" style="background:#8e44ad;color:white;" onclick="resetPassphrase(\'' + escapeHtml(data.clientName) + '\')">Reset Pass</button>' +
                    '</td></tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = '<p style="color: var(--color-error);">Error loading clients: ' + e.message + '</p>';
        }
    }

    // View Mappings
    async function viewMappings(name) {
        try {
            const doc = await db.collection('clients').doc(name).get();
            const mappings = doc.data()?.mappings || {};
            const entries = Object.entries(mappings).sort(([a], [b]) => a.localeCompare(b));

            let html = '<div class="modal-overlay" onclick="if(event.target===this)this.remove()">' +
                '<div class="modal">' +
                '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button>' +
                '<h3>' + escapeHtml(name) + ' — ' + entries.length + ' Mappings</h3>';

            if (entries.length === 0) {
                html += '<p style="color:var(--text-muted);">No mappings yet.</p>';
            } else {
                html += '<table class="mapping-detail-table"><thead><tr>' +
                    '<th>State</th><th>Plan Name</th><th>Payer ID</th><th>Payer Name</th>' +
                    '</tr></thead><tbody>';
                entries.forEach(([key, val]) => {
                    const [state, planName] = key.split('|');
                    html += '<tr><td>' + escapeHtml(state) + '</td><td>' + escapeHtml(planName) + '</td>' +
                        '<td>' + escapeHtml(val.availityPayerId || '') + '</td>' +
                        '<td>' + escapeHtml(val.availityPayerName || '') + '</td></tr>';
                });
                html += '</tbody></table>';
            }

            html += '</div></div>';
            document.body.insertAdjacentHTML('beforeend', html);
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    }

    // Export Excel
    async function exportExcel(name) {
        try {
            const doc = await db.collection('clients').doc(name).get();
            const mappings = doc.data()?.mappings || {};
            const rows = [['State', 'Plan Name', 'Payer ID', 'Payer Name']];
            Object.entries(mappings).sort(([a], [b]) => a.localeCompare(b)).forEach(([key, val]) => {
                const [state, planName] = key.split('|');
                rows.push([state, planName, val.availityPayerId || '', val.availityPayerName || '']);
            });
            const ws = XLSX.utils.aoa_to_sheet(rows);
            ws['!cols'] = [{ wch: 20 }, { wch: 40 }, { wch: 15 }, { wch: 40 }];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Mappings');
            XLSX.writeFile(wb, 'payer_mapping_' + name + '.xlsx');
            showToast('Exported Excel for ' + name, 'success');
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    }

    // Export UiPath JSON
    async function exportUiPath(name) {
        try {
            const doc = await db.collection('clients').doc(name).get();
            const mappings = doc.data()?.mappings || {};
            const outputByPayerState = {};

            Object.entries(mappings).forEach(([key, val]) => {
                const [state, planName] = key.split('|');
                const payerId = val.availityPayerId;
                if (!payerId || ALT_PORTAL_VALUES.includes(payerId)) return;
                const stateAbbrev = STATE_ABBREV[state] || state;
                const pKey = stateAbbrev + '|' + payerId;
                if (!outputByPayerState[pKey]) {
                    outputByPayerState[pKey] = { LocationCode: stateAbbrev, AvailityPayerID: payerId, ClaimDataPageLayoutType: 1, Queues: [] };
                }
                const queueName = planName.trim() + ', ' + stateAbbrev;
                if (!outputByPayerState[pKey].Queues.includes(queueName)) outputByPayerState[pKey].Queues.push(queueName);
            });

            const output = Object.values(outputByPayerState).sort((a, b) => {
                if (a.LocationCode !== b.LocationCode) return a.LocationCode.localeCompare(b.LocationCode);
                return a.AvailityPayerID.localeCompare(b.AvailityPayerID);
            });

            const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name + '_uipath.json'; a.click();
            URL.revokeObjectURL(url);
            showToast('Exported UiPath JSON for ' + name, 'success');
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    }

    // Edit Client (open main tool)
    function editClient(name) {
        window.open('index.html?client=' + encodeURIComponent(name), '_blank');
    }

    // Delete Client
    async function deleteClient(name) {
        if (!confirm('Delete client "' + name + '" and ALL their mappings? This cannot be undone.')) return;
        if (!confirm('Are you really sure? Type the client name to confirm.')) return;
        try {
            await db.collection('clients').doc(name).delete();
            showToast('Client "' + name + '" deleted', 'success');
            loadClients();
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    }

    // Reset Passphrase
    async function resetPassphrase(name) {
        const newPass = prompt('Enter new passphrase for "' + name + '":');
        if (!newPass) return;
        try {
            const hash = await hashPassphrase(newPass);
            await db.collection('clients').doc(name).update({ passphraseHash: hash });
            showToast('Passphrase reset for ' + name, 'success');
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    }

    // Dark mode toggle
    (function() {
        const toggle = document.getElementById('darkModeToggle');
        function updateToggle() {
            const isDark = document.documentElement.classList.contains('dark');
            toggle.textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
        }
        updateToggle();
        toggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            updateToggle();
        });
    })();
    </script>

    <footer style="text-align: center; color: var(--footer-color); font-size: 0.8em; margin-top: 40px; padding: 20px;">
        Payer Mapping Tool — Admin Dashboard v5.7
    </footer>
</body>
</html>
